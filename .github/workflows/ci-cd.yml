name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build Spring Boot JAR
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Set up Node 16
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install Dependecies
        working-directory: ./angular-app
        run: npm install --force
        
      - name: Angular App Build
        working-directory: ./angular-app
        run: npm run build --force

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        working-directory: ./springboot/app
        run: |
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest 
      - name: Build and push Frontend
        working-directory: ./angular-app
        run: |
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
